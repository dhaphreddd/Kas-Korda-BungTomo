<style>
        body {
            background-color: #0B1220; /* Specifically requested color overriding theme background slightly for absolute exactness if needed, though theme surface is close */
        }
        
        .glass-panel {
            background: #111827; /* Level 1 Cards/Sidebar */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-dark {
            background-color: #0B1220;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-dark:focus {
            border-color: #10B981; /* Primary Emerald */
            outline: none;
            box-shadow: 0 0 0 1px #10B981;
        }

        .btn-primary {
            background-color: #10B981;
            color: #ffffff;
            transition: all 0.2s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #0d9668;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
    </style>

<body class="min-h-screen flex items-center justify-center text-on-surface antialiased p-margin-mobile md:p-margin-desktop overflow-hidden relative">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
</div>
<!-- Login Container -->
<div class="w-full max-w-[440px] z-10">
<!-- Brand Header -->
<div class="text-center mb-stack-lg flex flex-col items-center">
<div class="w-16 h-16 rounded-lg bg-surface flex items-center justify-center border border-white/5 mb-4 shadow-[0_0_20px_rgba(16,185,129,0.1)]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Kas Korda Bung Tomo</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Sistem Informasi Keuangan &amp; Manajemen Acara</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-6 md:p-8">
<h2 class="font-body-lg text-body-lg text-on-surface font-semibold mb-6">Masuk ke Akun Anda</h2>
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-body-sm text-body-sm font-bold text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="mail">mail</span>
<input class="input-dark w-full rounded-lg py-3 pl-10 pr-4 font-body-sm text-body-sm text-on-surface placeholder-on-surface-variant/50 transition-colors" id="email" name="email" placeholder="admin@kaskorda.id" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm font-bold text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed transition-colors" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
<input class="input-dark w-full rounded-lg py-3 pl-10 pr-10 font-body-sm text-body-sm text-on-surface placeholder-on-surface-variant/50 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 pt-2 pb-4">
<div class="relative flex items-center">
<input class="peer appearance-none w-4 h-4 rounded border border-white/10 bg-[#0B1220] checked:bg-primary checked:border-primary cursor-pointer transition-all" id="remember" name="remember" type="checkbox"/>
<span class="material-symbols-outlined absolute left-0 text-[16px] text-[#0B1220] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Ingat sesi saya</label>
</div>
<!-- Submit Button -->
<button class="btn-primary w-full rounded-lg py-3 font-body-md text-body-md font-bold flex justify-center items-center gap-2" type="submit">
                    Masuk
                    <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Footer Info -->
<div class="text-center mt-stack-lg">
<p class="font-body-sm text-body-sm text-on-surface-variant/60">
                © 2024 Kas Korda Bung Tomo. All rights reserved.
            </p>
</div>
</div>
</body></html>
