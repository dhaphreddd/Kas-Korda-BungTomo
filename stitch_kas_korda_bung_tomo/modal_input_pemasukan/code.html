<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .backdrop-blur-overlay {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Custom Scrollbar for modal */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3c4a42;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #86948a;
        }

        /* Input specific styles */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden font-body-md">
<!-- Background Layer: Dashboard Utama Screenshot -->
<div class="fixed inset-0 z-0">
<iframe class="w-full h-full border-none pointer-events-none" src="{{DATA:SCREEN:SCREEN_8}}" title="Background Dashboard"></iframe>
</div>
<!-- Overlay Layer -->
<div class="fixed inset-0 z-40 bg-[#0B1220]/80 backdrop-blur-overlay flex items-center justify-center p-margin-mobile md:p-margin-desktop transition-opacity duration-300">
<!-- Modal Container -->
<div class="relative w-full max-w-2xl bg-[#111827] border border-outline-variant/30 rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.4)] flex flex-col max-h-full transform transition-all duration-300 scale-100">
<!-- Modal Header -->
<div class="flex items-center justify-between p-6 border-b border-outline-variant/30 shrink-0">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary-container/10 flex items-center justify-center border border-primary-container/20">
<span class="material-symbols-outlined text-primary-container">arrow_downward</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Tambah Transaksi Pemasukan</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Catat dana masuk ke dalam kas korda.</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-variant/30 focus:outline-none focus:ring-2 focus:ring-primary-container" type="button">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
<form class="space-y-6">
<!-- Row 1: Jenis Pemasukan & Tanggal -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface" for="jenisPemasukan">Jenis Pemasukan <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-[#0B1220] border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container appearance-none font-body-md" id="jenisPemasukan">
<option disabled="" selected="" value="">Pilih Kategori</option>
<option value="iuran">Iuran Anggota</option>
<option value="donasi">Donasi</option>
<option value="sponsor">Sponsor</option>
<option value="lainnya">Lainnya</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface" for="tanggalTransaksi">Tanggal Transaksi <span class="text-error">*</span></label>
<div class="relative">
<input class="w-full bg-[#0B1220] border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md [color-scheme:dark]" id="tanggalTransaksi" type="date"/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</div>
</div>
<!-- Row 2: Nama Event (Optional but prominent) -->
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface" for="namaEvent">Nama Event / Kegiatan (Opsional)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">search</span>
</div>
<input class="w-full bg-[#0B1220] border border-outline-variant rounded-lg pl-12 pr-4 py-3 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md placeholder:text-on-surface-variant/50" id="namaEvent" placeholder="Cari event aktif..." type="text"/>
</div>
</div>
<!-- Row 3: Nominal (Large) -->
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface" for="nominal">Nominal (Rp) <span class="text-error">*</span></label>
<div class="relative rounded-lg bg-[#0B1220] border border-outline-variant focus-within:border-primary-container focus-within:ring-1 focus-within:ring-primary-container overflow-hidden flex items-center px-4 py-3">
<span class="text-on-surface-variant font-numeric-lg text-headline-md mr-2">Rp</span>
<input class="w-full bg-transparent border-none text-primary-container font-numeric-lg text-numeric-lg focus:ring-0 p-0 text-right placeholder:text-primary-container/30" id="nominal" placeholder="0" type="number"/>
</div>
</div>
<!-- Row 4: Sumber Dana -->
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface" for="sumberDana">Sumber Dana / Nama Pengirim <span class="text-error">*</span></label>
<input class="w-full bg-[#0B1220] border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md placeholder:text-on-surface-variant/50" id="sumberDana" placeholder="Contoh: Transfer Bank BCA an. Budi" type="text"/>
</div>
<!-- Row 5: Keterangan -->
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface" for="keterangan">Keterangan</label>
<textarea class="w-full bg-[#0B1220] border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container font-body-md placeholder:text-on-surface-variant/50 resize-y" id="keterangan" placeholder="Catatan tambahan..." rows="3"></textarea>
</div>
<!-- Row 6: Bukti Transaksi -->
<div class="space-y-2">
<label class="block font-body-sm text-body-sm font-bold text-on-surface">Bukti Transaksi</label>
<div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-outline-variant border-dashed rounded-lg bg-[#0B1220] hover:bg-surface-variant/10 transition-colors cursor-pointer group">
<div class="space-y-1 text-center">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary-container transition-colors">cloud_upload</span>
<div class="flex text-sm text-on-surface-variant justify-center mt-2">
<label class="relative cursor-pointer bg-transparent rounded-md font-medium text-primary-container hover:text-primary focus-within:outline-none" for="file-upload">
<span>Unggah file</span>
<input accept="image/*,.pdf" class="sr-only" id="file-upload" name="file-upload" type="file"/>
</label>
<p class="pl-1">atau seret dan lepas</p>
</div>
<p class="text-xs text-on-surface-variant/70">
                                    PNG, JPG, PDF up to 5MB
                                </p>
</div>
</div>
</div>
</form>
</div>
<!-- Modal Footer (Actions) -->
<div class="p-6 border-t border-outline-variant/30 bg-[#111827] rounded-b-xl flex items-center justify-end gap-4 shrink-0">
<button class="px-6 py-2.5 rounded-lg border border-outline-variant text-on-surface-variant hover:bg-surface-variant/30 hover:text-on-surface transition-colors font-body-md font-medium" type="button">
                    Batal
                </button>
<button class="px-6 py-2.5 rounded-lg bg-[#10B981] hover:bg-[#0ea5e9] hover:bg-[#10B981]/90 text-white font-body-md font-bold transition-colors shadow-lg shadow-[#10B981]/20 flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">save</span>
                    Simpan Transaksi
                </button>
</div>
</div>
</div>
<script>
        // Set default date to today
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('tanggalTransaksi');
            if (dateInput) {
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
            }

            // Simple auto-format for currency input (visual only, actual value should be parsed)
            const nominalInput = document.getElementById('nominal');
            if(nominalInput) {
                nominalInput.addEventListener('input', function(e) {
                     // Keep it as a raw number input for ease of use, but in a real app 
                     // you might use a text input and format with dots.
                     // The placeholder and styling implies it.
                });
            }
        });
    </script>
</body></html>
